<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>小马里奥</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:sans-serif}
.wrap{position:relative}
canvas{display:block;border:2px solid #333;border-radius:4px;image-rendering:pixelated}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,.6);color:#fff;border-radius:4px;pointer-events:none}
.overlay h1{font-size:36px;margin-bottom:8px}
.overlay p{font-size:14px;color:#aaa}
.hint{text-align:center;color:#666;margin-top:8px;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
<canvas id="c" width="600" height="400"></canvas>
<div class="overlay" id="overlay">
  <h1>🎮 小马里奥</h1>
<p>A D 移动 &nbsp; 空格 跳跃</p>
</div>
</div>
<div class="hint">踏扁敌人 · 收集金币 · 别掉下去</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

const W = 600, H = 400;
const GRAVITY = 0.6;
const FRICTION = 0.8;

// ── Game State ──
let gameOver = false;
let win = false;
let score = 0;
let camera = 0;

// ── Keys ──
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') e.preventDefault();
  if ((gameOver || win) && e.key === 'r') restart();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ── Player ──
const player = {
  x: 60, y: 300, w: 24, h: 32,
  vx: 0, vy: 0,
  onGround: false,
  facing: 1,
  frame: 0, frameTimer: 0,
  jumpBuffer: 0,
  _jumpHeld: false,
  jumps: 0
};

// ── Entities ──
let platforms = [];
let enemies = [];
let coins = [];
let particles = [];

function buildLevel() {
  platforms = [
    // ground
    {x:0,y:368,w:800,h:32},
    // floating platforms
    {x:200,y:300,w:96,h:16},
    {x:380,y:240,w:96,h:16},
    {x:560,y:180,w:96,h:16},
    {x:100,y:180,w:80,h:16},
    {x:750,y:280,w:80,h:16},
    // stairs
    {x:480,y:320,w:64,h:16},
    {x:540,y:280,w:16,h:16},
    {x:880,y:300,w:128,h:16},
    {x:900,y:260,w:48,h:16},
    // flag platform
    {x:1060,y:200,w:32,h:168},
  ];

  enemies = [
    {x:320,y:352,w:24,h:24,vx:-1.2,alive:true,frame:0},
    {x:520,y:264,w:24,h:24,vx:-1,alive:true,frame:0},
    {x:150,y:280,w:24,h:24,vx:-0.8,alive:true,frame:0},
    {x:820,y:300,w:24,h:24,vx:-1.2,alive:true,frame:0},
  ];

  coins = [];
  for (let i = 0; i < 5; i++) coins.push({x:240+i*32,y:270,w:12,h:12,collected:false});
  for (let i = 0; i < 4; i++) coins.push({x:410+i*32,y:210,w:12,h:12,collected:false});
  for (let i = 0; i < 4; i++) coins.push({x:130+i*32,y:150,w:12,h:12,collected:false});
  for (let i = 0; i < 3; i++) coins.push({x:780+i*32,y:250,w:12,h:12,collected:false});

  particles = [];

  player.x = 60; player.y = 300;
  player.vx = 0; player.vy = 0;
  player.onGround = false;
  camera = 0;
  gameOver = false;
  win = false;
  score = 0;
  overlay.style.display = 'flex';
  overlay.innerHTML = '<h1>🎮 小马里奥</h1><p>→ ← 移动 &nbsp; 空格 跳跃</p>';
}

// ── Collision ──
function rectCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function collideLevel(entity, nx, ny) {
  const e = {x:nx, y:ny, w:entity.w, h:entity.h};
  for (const p of platforms) {
    if (rectCollide(e, p)) return p;
  }
  return null;
}

// ── Particles ──
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: -Math.random() * 6 - 2,
      life: 30 + Math.random() * 20,
      color,
      size: 3 + Math.random() * 3
    });
  }
}

// ── Update ──
function update() {
  if (gameOver || win) return;

  // Jump buffer: press space once, jump triggers within buffer window
  if ((keys[' '] || keys['ArrowUp']) && !player._jumpHeld) {
    player.jumpBuffer = 8;
  }
  player._jumpHeld = keys[' '] || keys['ArrowUp'];
  if (player.jumpBuffer > 0) player.jumpBuffer--;

  // Reset jumps when on ground
  if (player.onGround) player.jumps = 2;

  // Horizontal
  let accel = 0;
  if (keys['a'] || keys['ArrowLeft']) { accel = -0.5; player.facing = -1; }
  if (keys['d'] || keys['ArrowRight']) { accel = 0.5; player.facing = 1; }
  player.vx += accel;
  player.vx *= FRICTION;
  if (Math.abs(player.vx) < 0.1) player.vx = 0;

  // Jump
  if (player.jumpBuffer > 0 && player.jumps > 0) {
    player.vy = -9.5;
    player.jumps--;
    player.jumpBuffer = 0;
    player.onGround = false;
  }
  // Gravity
  player.vy += GRAVITY;
  if (player.vy > 12) player.vy = 12;

  // Move X
  let nx = player.x + player.vx;
  if (nx < camera) nx = camera;
  if (collideLevel(player, nx, player.y)) {
    if (player.vx > 0) nx = Math.floor((nx - player.w) / 16) * 16 + player.w;
    else nx = Math.ceil(nx / 16) * 16;
    player.vx = 0;
  }

  // Move Y
  let ny = player.y + player.vy;
  player.onGround = false;
  const colY = collideLevel(player, player.x, ny);
  if (colY) {
    if (player.vy > 0) {
      ny = colY.y - player.h;
      player.onGround = true;
      player.vy = 0;
    } else {
      ny = colY.y + colY.h;
      player.vy = 0;
    }
  }

  player.x = nx;
  player.y = ny;

  // Fall off
  if (player.y > H + 50) {
    gameOver = true;
    overlay.style.display = 'flex';
    overlay.innerHTML = '<h1>💀 掉下去了</h1><p>按 R 重新开始</p>';
    return;
  }

  // Animation
  if (Math.abs(player.vx) > 0.3 && player.onGround) {
    player.frameTimer++;
    if (player.frameTimer > 5) { player.frame = (player.frame + 1) % 2; player.frameTimer = 0; }
  } else {
    player.frame = 0;
  }

  // Camera
  let targetCam = player.x - 150;
  if (targetCam < 0) targetCam = 0;
  camera += (targetCam - camera) * 0.1;

  // Update enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    e.x += e.vx;
    // Reverse on wall
    if (collideLevel(e, e.x, e.y) || collideLevel(e, e.x + e.w, e.y)) {
      e.vx *= -1;
      e.x += e.vx * 2;
    }
    // Check stomp
    if (rectCollide(player, e)) {
      if (player.vy > 0 && player.y + player.h - e.y < 16) {
        e.alive = false;
        player.vy = -8;
        score += 100;
        spawnParticles(e.x + e.w/2, e.y + e.h/2, '#e94560', 8);
      } else {
        gameOver = true;
        overlay.style.display = 'flex';
        overlay.innerHTML = '<h1>💀 被抓住了</h1><p>按 R 重新开始</p>';
        return;
      }
    }
  }

  // Coins
  for (const c of coins) {
    if (c.collected) continue;
    if (rectCollide(player, c)) {
      c.collected = true;
      score += 50;
      spawnParticles(c.x, c.y, '#f0d060', 6);
    }
  }

  // Win flag (end of level)
  if (player.x > 1080) {
    win = true;
    overlay.style.display = 'flex';
    overlay.innerHTML = '<h1>🏁 通关！</h1><p>得分: ' + score + ' &nbsp; 按 R 重玩</p>';
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ── Draw ──
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#5c94fc');
  grad.addColorStop(1, '#b8d8ff');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  for (let i = 0; i < 8; i++) {
    const cx = (i * 200 + 50) % 1200 - camera * 0.3;
    ctx.beginPath();
    ctx.ellipse(cx, 40 + (i % 3) * 30, 30 + (i % 4) * 10, 12, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Hills
  ctx.fillStyle = '#5a9e3e';
  for (let i = 0; i < 6; i++) {
    const hx = i * 250 - camera * 0.5;
    ctx.beginPath();
    ctx.ellipse(hx, 355, 140, 50, 0, Math.PI, 0);
    ctx.fill();
  }

  ctx.save();
  ctx.translate(-camera, 0);

  // Platforms
  for (const p of platforms) {
    // Brick pattern
    ctx.fillStyle = '#c84c09';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.strokeStyle = '#a03800';
    ctx.lineWidth = 1;
    ctx.strokeRect(p.x, p.y, p.w, p.h);
    // Brick lines
    ctx.strokeStyle = '#a03800';
    for (let bx = p.x + 16; bx < p.x + p.w; bx += 16) {
      ctx.beginPath(); ctx.moveTo(bx, p.y); ctx.lineTo(bx, p.y + p.h); ctx.stroke();
    }
    for (let by = p.y + 8; by < p.y + p.h; by += 8) {
      ctx.beginPath(); ctx.moveTo(p.x, by); ctx.lineTo(p.x + p.w, by); ctx.stroke();
    }
  }

  // Distant castle
  ctx.fillStyle = '#666';
  ctx.fillRect(1100, 100, 60, 100);
  ctx.fillRect(1120, 60, 20, 40);
  ctx.fillStyle = '#222';
  for (let cy = 110; cy < 200; cy += 30) {
    ctx.fillRect(1102, cy, 8, 8);
    ctx.fillRect(1150, cy, 8, 8);
  }
  ctx.fillRect(1130, 200, 40, 168);

  // Flag pole
  ctx.fillStyle = '#888';
  ctx.fillRect(1055, 100, 4, 268);
  ctx.fillStyle = '#0a0';
  ctx.fillRect(1059, 108, 20, 12);
  ctx.fillRect(1062, 120, 14, 10);

  // Coins
  for (const c of coins) {
    if (c.collected) continue;
    ctx.fillStyle = '#f0d060';
    ctx.beginPath();
    ctx.ellipse(c.x + c.w/2, c.y + c.h/2, c.w/2, c.h/2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#d0a030';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = '#d0a030';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('$', c.x + c.w/2, c.y + c.h/2 + 4);
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    // Body
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(e.x, e.y, e.w, e.h);
    // Feet
    const f = Math.sin(Date.now() / 100) > 0 ? 0 : 1;
    ctx.fillRect(e.x + 2, e.y + e.h - 6, 8, 6);
    ctx.fillRect(e.x + e.w - 10, e.y + e.h - 6, 8, 6);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(e.x + 4, e.y + 6, 6, 6);
    ctx.fillRect(e.x + e.w - 10, e.y + 6, 6, 6);
    ctx.fillStyle = '#000';
    ctx.fillRect(e.x + 8, e.y + 8, 3, 3);
    ctx.fillRect(e.x + e.w - 7, e.y + 8, 3, 3);
  }

  // Player
  if (!gameOver && !win || true) {
    const px = player.x, py = player.y;
    const f = player.facing;

    // Hat
    ctx.fillStyle = '#e01010';
    ctx.fillRect(px + 4, py, 16, 6);
    ctx.fillRect(px + 2, py + 3, 20, 4);

    // Face
    ctx.fillStyle = '#f5c8a0';
    ctx.fillRect(px + 4, py + 7, 16, 9);

    // Eyes
    ctx.fillStyle = '#000';
    if (f > 0) {
      ctx.fillRect(px + 14, py + 8, 3, 3);
    } else {
      ctx.fillRect(px + 7, py + 8, 3, 3);
    }

    // Mustache
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(px + (f > 0 ? 8 : 6), py + 12, 10, 3);

    // Body
    ctx.fillStyle = '#e01010';
    ctx.fillRect(px + 2, py + 16, 20, 10);

    // Overalls
    ctx.fillStyle = '#1040c0';
    ctx.fillRect(px + 2, py + 20, 20, 8);

    // Buttons
    ctx.fillStyle = '#f0d060';
    ctx.fillRect(px + 6, py + 18, 3, 3);
    ctx.fillRect(px + 15, py + 18, 3, 3);

    // Legs (animate)
    if (!player.onGround) {
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(px + 4, py + 28, 6, 4);
      ctx.fillRect(px + 14, py + 28, 6, 4);
    } else if (Math.abs(player.vx) > 0.3) {
      const legOff = Math.sin(Date.now() / 80) * 3;
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(px + 4 + legOff, py + 28, 6, 4);
      ctx.fillRect(px + 14 - legOff, py + 28, 6, 4);
    } else {
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(px + 4, py + 28, 6, 4);
      ctx.fillRect(px + 14, py + 28, 6, 4);
    }
  }

  ctx.restore();

  // HUD (fixed on screen)
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(4, 4, 120, 24);
  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('金币: ' + score, 10, 22);

  // Particles (world-relative)
  ctx.save();
  ctx.translate(-camera, 0);
  for (const p of particles) {
    const alpha = p.life / 30;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

function restart() {
  for (const k in keys) keys[k] = false;
  buildLevel();
  overlay.style.display = 'none';
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

buildLevel();
overlay.style.display = 'flex';
loop();
</script>
</body>
</html>
